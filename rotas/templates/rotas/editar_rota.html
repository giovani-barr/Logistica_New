{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rota - Fermap Logística</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f5f5f5; }
        
        nav { background: #202124; color: white; padding: 15px; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        
        .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        h1 { color: #202124; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 4px; font-family: 'Roboto', sans-serif; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #4285F4; box-shadow: 0 0 5px rgba(66,133,244,0.3); }
        
        textarea { resize: vertical; min-height: 100px; }
        
        .btn-group { display: flex; gap: 10px; }
        
        .btn { padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-submit { background: #4285F4; color: white; }
        .btn-submit:hover { background: #2f6ad4; }
        .btn-cancel { background: #70757a; color: white; text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <strong style="font-size: 18px;">Fermap Logística</strong>
    <a href="/rotas/">Voltar às Rotas</a>
</nav>

<div class="container">
    <div class="form-card">
        <h1>Editar Rota</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="nome">Nome da Rota *</label>
                <input type="text" id="nome" name="nome" value="{{ rota.nome }}" required>
            </div>
            
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao">{{ rota.descricao }}</textarea>
            </div>
            
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if rota.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="observacoes">Observações Gerais</label>
                <textarea id="observacoes" name="observacoes">{{ rota.observacoes }}</textarea>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-submit">Salvar Alterações</button>
                <a href="/rotas/{{ rota.id }}/" class="btn btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
